<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
    <style>
        :root {
            --brand-orange: #EF6D23;
            --brand-bg: #fcf8f9;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --brand-bg: #0F0F10;
            }
        }
        .outer { fill: var(--brand-orange); }
        .inner { stroke: var(--brand-bg); }
        .center { fill: var(--brand-bg); }
    </style>
    <circle class="outer" cx="256" cy="256" r="230" />
    <circle class="inner" cx="256" cy="256" r="100" fill="none" stroke-width="20" />
    <circle class="center" cx="256" cy="256" r="30" />
</svg>
